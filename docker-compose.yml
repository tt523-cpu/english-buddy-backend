# ============================================================
# English Buddy Backend - Docker Compose
#
# One-command deploy:
#   docker compose up -d
#   Then open http://your-server-ip:5000/admin to configure API keys
#
# With frontend:
#   Put your Flutter Web build in ./web/ directory
# ============================================================

services:
  backend:
    build: .
    container_name: english-buddy-backend
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
