# ============================================================
# English Buddy Backend - Docker Compose
#
# Deploy:
#   1. cp .env.example .env
#   2. Edit .env with your API keys
#   3. docker compose up -d
#   4. Open http://your-server-ip:5000
#
# With frontend:
#   Put your Flutter Web build in ./web/ directory
#   Then docker compose up -d
# ============================================================

services:
  backend:
    build: .
    container_name: english-buddy-backend
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
